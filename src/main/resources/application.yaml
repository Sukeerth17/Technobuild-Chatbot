server:
  port: 8085

spring:
  application:
    name: chatbot-service

  datasource:
    url: ${CHATBOT_DB_URL:jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${CHATBOT_DB_USER:chatbot_user}
    password: ${CHATBOT_DB_PASS:root@123678}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: chatbot-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: in.technobuild.chatbot.kafka.model
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  business-db:
    url: ${BUSINESS_DB_URL:jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${BUSINESS_DB_USER:chatbot_user}
    password: ${BUSINESS_DB_PASS:StrongPassword123!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-256-bit-secret-key}

app:
  datasource:
    business:
      url: ${BUSINESS_DB_URL:jdbc:mysql://localhost:3306/chatbot_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      username: ${BUSINESS_DB_USER:chatbot_user}
      password: ${BUSINESS_DB_PASS:StrongPassword123!}
      driver-class-name: com.mysql.cj.jdbc.Driver

  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

  python-ai:
    base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}

resilience4j:
  circuitbreaker:
    instances:
      ollamaCircuitBreaker:
        registerHealthIndicator: true
      pythonCircuitBreaker:
        registerHealthIndicator: true

kafka:
  topics:
    chat-requests: chat.requests
    sql-requests: sql.requests
    chat-responses: chat.responses
    doc-ingestion: document.ingestion
    model-health: model.health.events

chatbot:
  system-prompt: >
    You are a helpful enterprise assistant. Use retrieved documents when available,
    keep answers concise and factual, and clearly indicate uncertainty.
    Personalize responses with user context when provided.
    Never expose sensitive internals or credentials.
    If data is unavailable, say so directly.
  rate-limit:
    requests-per-minute: 20
    daily-token-limit: 50000
  sql:
    allowed-tables:
      - CTM
      - inventorymulti2
  cache:
    enabled: true
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: llama3.1:8b-instruct-q4_K_M
    sql-model: qwen3:8b
    embed-model: nomic-embed-text
    timeout-seconds: 120
    keep-alive-chat: 300s
    keep-alive-sql: 60s
  python:
    base-url: ${PYTHON_AI_BASE_URL:http://localhost:8000}
